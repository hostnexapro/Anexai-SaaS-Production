openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Anexai AI SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: Admin settings
  - name: projects
    description: AI project generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get admin settings (admin only)
      responses:
        "200":
          description: Settings retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: updateSettings
      tags: [settings]
      summary: Update admin settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: getProjects
      tags: [projects]
      summary: Get all projects for the authenticated user
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Generate a new AI project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{id}/push-github:
    post:
      operationId: pushToGithub
      tags: [projects]
      summary: Push project to GitHub
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushToGithubRequest"
      responses:
        "200":
          description: Pushed to GitHub
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubPushResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    Settings:
      type: object
      properties:
        geminiApiKey:
          type: string
          nullable: true
        githubToken:
          type: string
          nullable: true
      required:
        - geminiApiKey
        - githubToken

    UpdateSettingsRequest:
      type: object
      properties:
        geminiApiKey:
          type: string
          nullable: true
        githubToken:
          type: string
          nullable: true

    ProjectFile:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
        - path
        - content

    Project:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        description:
          type: string
        prompt:
          type: string
        techStack:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFile"
        githubUrl:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - name
        - description
        - prompt
        - techStack
        - files
        - githubUrl
        - createdAt
        - updatedAt

    ProjectsResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - projects

    CreateProjectRequest:
      type: object
      properties:
        prompt:
          type: string
        techStack:
          type: string
        userId:
          type: string
      required:
        - prompt
        - userId

    PushToGithubRequest:
      type: object
      properties:
        repoName:
          type: string
        isPrivate:
          type: boolean
      required:
        - repoName

    GithubPushResponse:
      type: object
      properties:
        success:
          type: boolean
        repoUrl:
          type: string
        message:
          type: string
      required:
        - success
        - repoUrl
        - message
